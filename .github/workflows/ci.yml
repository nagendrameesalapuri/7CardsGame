name: CI — Build & Test

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Lint client
        run: npm run lint
        working-directory: client
        continue-on-error: true

      - name: Lint server
        run: npm run lint
        working-directory: server
        continue-on-error: true

      - name: Type-check server
        run: npx tsc --noEmit
        working-directory: server
        continue-on-error: true

  # ── Job 2: Playwright E2E Tests ──────────────────────────────────────────────
  test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      MONGODB_URI_TEST: mongodb://localhost:27017/7cards_test
      JWT_SECRET: playwright-test-jwt-secret-do-not-use
      ADMIN_SECRET: admin-test-123
      RESEND_API_KEY: ''
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      CLIENT_URL: http://localhost:3000
      SESSION_SECRET: test-session-secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root deps (Playwright)
        run: npm ci

      - name: Install client deps
        run: npm ci
        working-directory: client

      - name: Install server deps
        run: npm ci
        working-directory: server

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --project=chromium

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots & videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── Job 3: Build check ───────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install & build client
        working-directory: client
        env:
          VITE_BACKEND_URL: ''
        run: |
          npm ci
          npm run build

      - name: Install & build server
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-dist-${{ github.run_number }}
          path: client/dist/
          retention-days: 3
